name: Linting, formatting, and tests
on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync dev dependencies
        run: uv sync --frozen --group dev
      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ github.job }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit (pull request)
        if: github.event_name == 'pull_request'
        run: >
          uv run --only-group dev pre-commit run
          --show-diff-on-failure
          --from-ref ${{ github.event.pull_request.base.sha }}
          --to-ref ${{ github.event.pull_request.head.sha }}
      - name: Run pre-commit (push / manual)
        if: github.event_name != 'pull_request'
        run: uv run --only-group dev pre-commit run --show-diff-on-failure --all-files

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync dev dependencies
        run: uv sync --frozen --group dev
      - name: Run pytest
        run: uv run pytest
